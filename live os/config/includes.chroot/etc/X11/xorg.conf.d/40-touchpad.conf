Section "InputClass"
    Identifier "libinput touchpad defaults"
    MatchIsTouchpad "on"
    Driver "libinput"
    Option "Tapping" "on"
    Option "NaturalScrolling" "true"
    Option "AccelProfile" "adaptive"
EndSection

Section "InputClass"
    Identifier "libinput pointer defaults"
    MatchIsPointer "on"
    Driver "libinput"
    Option "AccelProfile" "adaptive"
EndSection
